name: Deploy Convex Backend
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx convex deploy -y
        env:
          CONVEX_DEPLOY_KEY: "prod:ardent-schnauzer-537|eyJ2MiI6IjhmOTk2OTg2NWE2OTQ3OTNhYWYxZWI4MjBhNzU4ZjUyIn0="
