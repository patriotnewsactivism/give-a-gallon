<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0608"/>
      <stop offset="55%" stop-color="#2b0b0e"/>
      <stop offset="100%" stop-color="#0d0405"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e5383b"/>
      <stop offset="100%" stop-color="#a4161a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#a4161a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a4161a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Large gas-gauge mark (same geometry as the favicon, scaled up) -->
  <g transform="translate(600 232) scale(11)" fill="none" stroke-linecap="round">
    <!-- Track -->
    <path d="M -8 0 A 8 8 0 0 1 8 0" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2.4"/>
    <!-- Fill (about 68% toward Full) -->
    <path d="M -8 0 A 8 8 0 0 1 4.29 -6.75" stroke="url(#fill)" stroke-width="2.4"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="3.21" y2="-5.07" stroke="#ffffff" stroke-width="1.6"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="1.7" fill="#ffffff" stroke="none"/>
    <!-- E / F labels -->
    <text x="-8.4" y="3.6" font-family="Arial, sans-serif" font-size="3" font-weight="700" fill="#ffffff" fill-opacity="0.55" stroke="none" text-anchor="middle">E</text>
    <text x="8.4" y="3.6" font-family="Arial, sans-serif" font-size="3" font-weight="700" fill="#ffffff" fill-opacity="0.55" stroke="none" text-anchor="middle">F</text>
  </g>

  <!-- Wordmark -->
  <text x="600" y="430" font-family="'Oswald', 'Arial Narrow', sans-serif" font-size="92" font-weight="700" letter-spacing="6" fill="#ffffff" text-anchor="middle">GIVE A GALLON</text>

  <!-- Tagline -->
  <text x="600" y="494" font-family="'Oswald', Arial, sans-serif" font-size="34" font-weight="500" letter-spacing="3" fill="#e5383b" text-anchor="middle">FUEL THE MOVEMENT</text>

  <!-- Supporting line -->
  <text x="600" y="556" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">Fundraising for activists — donate in gallons of gas.</text>
</svg>
