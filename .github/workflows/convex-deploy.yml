name: Deploy Convex Backend
on:
  workflow_dispatch:
  push:
    paths:
      - 'convex/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Set Convex environment variables
        run: |
          npx convex env set SITE_URL "https://give-a-gallon.vercel.app" || true
          node scripts/generateJwks.cjs
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - run: npx convex deploy -y
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
